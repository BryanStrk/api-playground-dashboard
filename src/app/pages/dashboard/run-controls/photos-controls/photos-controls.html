<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="photos-query">Término</label>
      <input
        id="photos-query"
        type="text"
        class="form-control"
        autocomplete="off"
        placeholder="mountains, cats, coffee…"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        name="query"
      />
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Otra foto</button>
  </div>
</form>
