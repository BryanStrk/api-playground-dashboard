<div class="run-controls">
  <div
    class="btn-group btn-group-sm characters-controls__tabs"
    role="tablist"
    aria-label="Sección de Rick and Morty"
  >
    @for (t of tabs; track t.id) {
      <button
        type="button"
        class="btn btn-outline-secondary"
        role="tab"
        [class.active]="tab() === t.id"
        [attr.aria-selected]="tab() === t.id"
        (click)="selectTab(t.id)"
      >
        {{ t.label }}
      </button>
    }
  </div>

  @switch (tab()) {
    @case ('characters') {
      <form class="characters-controls__form" (ngSubmit)="submit()">
        <div class="run-controls__row">
          <div class="run-controls__field flex-grow-1">
            <label class="form-label" for="characters-name">Nombre</label>
            <input
              id="characters-name"
              type="text"
              class="form-control"
              autocomplete="off"
              placeholder="rick, morty, summer…"
              [ngModel]="name()"
              (ngModelChange)="name.set($event)"
              name="name"
            />
          </div>
          <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
          <button
            type="button"
            class="btn btn-outline-secondary run-controls__submit"
            (click)="randomCharacter()"
          >
            Aleatorio
          </button>
        </div>

        <div class="run-controls__row">
          <div class="run-controls__field">
            <label class="form-label" for="characters-status">Estado</label>
            <select
              id="characters-status"
              class="form-select"
              [ngModel]="status()"
              (ngModelChange)="status.set($event)"
              name="status"
            >
              @for (s of statuses; track s.value) {
                <option [value]="s.value">{{ s.label }}</option>
              }
            </select>
          </div>
          <div class="run-controls__field flex-grow-1">
            <label class="form-label" for="characters-species">Especie</label>
            <input
              id="characters-species"
              type="text"
              class="form-control"
              autocomplete="off"
              placeholder="Human, Alien, Robot…"
              [ngModel]="species()"
              (ngModelChange)="species.set($event)"
              name="species"
            />
          </div>
          <div class="run-controls__field">
            <label class="form-label" for="characters-gender">Género</label>
            <select
              id="characters-gender"
              class="form-select"
              [ngModel]="gender()"
              (ngModelChange)="gender.set($event)"
              name="gender"
            >
              @for (g of genders; track g.value) {
                <option [value]="g.value">{{ g.label }}</option>
              }
            </select>
          </div>
        </div>

        <p class="run-controls__hint mb-0">
          Con nombre se busca por texto; sin nombre, los filtros aplican al listado paginado.
        </p>
      </form>
    }

    @case ('episodes') {
      <form class="characters-controls__form" (ngSubmit)="submit()">
        <div class="run-controls__row">
          <div class="run-controls__field flex-grow-1">
            <label class="form-label" for="episodes-q">Nombre o código</label>
            <input
              id="episodes-q"
              type="text"
              class="form-control"
              autocomplete="off"
              placeholder="Pilot, S01E01, anatomy…"
              [ngModel]="episodeQuery()"
              (ngModelChange)="episodeQuery.set($event)"
              name="episodeQuery"
            />
          </div>
          <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
        </div>
        <p class="run-controls__hint mb-0">
          Son datos del episodio (no el vídeo). Pulsa uno para ver los personajes que aparecen.
        </p>
      </form>
    }

    @case ('locations') {
      <form class="characters-controls__form" (ngSubmit)="submit()">
        <div class="run-controls__row">
          <div class="run-controls__field flex-grow-1">
            <label class="form-label" for="locations-q">Nombre</label>
            <input
              id="locations-q"
              type="text"
              class="form-control"
              autocomplete="off"
              placeholder="Earth, Citadel, dimension…"
              [ngModel]="locationQuery()"
              (ngModelChange)="locationQuery.set($event)"
              name="locationQuery"
            />
          </div>
          <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
        </div>
      </form>
    }
  }
</div>
