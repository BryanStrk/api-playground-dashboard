<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="users-nat">Nacionalidad</label>
      <select
        id="users-nat"
        class="form-select"
        [ngModel]="nat()"
        (ngModelChange)="nat.set($event)"
        name="nat"
      >
        @for (n of nationalities; track n.code) {
          <option [value]="n.code">{{ n.label }} ({{ n.code }})</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Otro usuario</button>
  </div>
</form>
