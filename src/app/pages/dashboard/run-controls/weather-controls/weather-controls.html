<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="weather-city">Ciudad</label>
      <input
        id="weather-city"
        type="text"
        class="form-control"
        autocomplete="off"
        placeholder="Tokyo, Madrid, Buenos Aires…"
        [ngModel]="city()"
        (ngModelChange)="city.set($event)"
        name="city"
      />
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>
</form>
