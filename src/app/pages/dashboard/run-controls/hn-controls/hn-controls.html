<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="hn-type">Tipo</label>
      <select
        id="hn-type"
        class="form-select"
        [ngModel]="type()"
        (ngModelChange)="type.set($event)"
        name="type"
      >
        @for (t of types; track t.value) {
          <option [value]="t.value">{{ t.label }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Refrescar</button>
  </div>
</form>
