<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="sports-competition">Competición</label>
      <select
        id="sports-competition"
        class="form-select"
        [ngModel]="code()"
        (ngModelChange)="onCompetitionChange($event)"
        name="competition"
      >
        @for (c of competitions(); track c.code) {
          <option [value]="c.code">{{ c.name }} ({{ c.code }})</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>

  <div
    class="btn-group btn-group-sm sports-controls__tabs"
    role="tablist"
    aria-label="Vista de la competición"
  >
    @for (t of tabs; track t.id) {
      <button
        type="button"
        class="btn btn-outline-secondary"
        role="tab"
        [class.active]="tab() === t.id"
        [attr.aria-selected]="tab() === t.id"
        (click)="selectTab(t.id)"
      >
        {{ t.label }}
      </button>
    }
  </div>

  @if (tab() === 'matches') {
    <div
      class="btn-group btn-group-sm sports-controls__subtabs"
      role="group"
      aria-label="Tipo de partidos"
    >
      <button
        type="button"
        class="btn btn-outline-secondary"
        [class.active]="matchesType() === 'upcoming'"
        [attr.aria-pressed]="matchesType() === 'upcoming'"
        (click)="selectMatchesType('upcoming')"
      >
        Próximos
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        [class.active]="matchesType() === 'recent'"
        [attr.aria-pressed]="matchesType() === 'recent'"
        (click)="selectMatchesType('recent')"
      >
        Resultados recientes
      </button>
    </div>
  }
</form>
