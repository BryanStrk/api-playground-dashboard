<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="movies-query">Título</label>
      <input
        id="movies-query"
        type="text"
        class="form-control"
        autocomplete="off"
        placeholder="Inception, El Padrino…"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        name="query"
      />
    </div>
    <div class="run-controls__field">
      <label class="form-label" for="movies-genre">Género</label>
      <select
        id="movies-genre"
        class="form-select"
        [ngModel]="genre()"
        (ngModelChange)="genre.set($event)"
        name="genre"
      >
        <option value="">Todos</option>
        @for (g of genres(); track g.id) {
          <option [value]="g.id">{{ g.name }}</option>
        }
      </select>
    </div>
    <div class="run-controls__field">
      <label class="form-label" for="movies-year">Año</label>
      <select
        id="movies-year"
        class="form-select"
        [ngModel]="year()"
        (ngModelChange)="year.set($event)"
        name="year"
      >
        <option value="">Todos</option>
        @for (y of years; track y) {
          <option [value]="y">{{ y }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>
  <p class="run-controls__hint mb-0">
    Sin filtros se aplica «descubrir» por popularidad. Con título se busca en TMDB.
  </p>
</form>
