<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="dictionary-word">Palabra (inglés)</label>
      <input
        id="dictionary-word"
        type="text"
        class="form-control"
        [class.is-invalid]="showHint() && invalid()"
        autocomplete="off"
        placeholder="hello, code, run…"
        [ngModel]="word()"
        (ngModelChange)="onInput($event)"
        name="word"
        aria-describedby="dictionary-hint"
      />
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>
  @if (showHint()) {
    <p id="dictionary-hint" class="run-controls__hint text-warning-emphasis mb-0" role="alert">
      {{ hint }}
    </p>
  } @else {
    <p id="dictionary-hint" class="run-controls__hint mb-0">{{ hint }}</p>
  }
</form>
