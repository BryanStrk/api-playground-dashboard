<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="news-country">País</label>
      <select
        id="news-country"
        class="form-select"
        [ngModel]="country()"
        (ngModelChange)="country.set($event); onChange()"
        name="country"
      >
        @for (c of countries; track c.code) {
          <option [value]="c.code">{{ c.label }} ({{ c.code }})</option>
        }
      </select>
    </div>
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="news-category">Categoría</label>
      <select
        id="news-category"
        class="form-select"
        [ngModel]="category()"
        (ngModelChange)="category.set($event); onChange()"
        name="category"
      >
        @for (c of categories; track c.value) {
          <option [value]="c.value">{{ c.label }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>
</form>
