<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="news-query">Búsqueda</label>
      <input
        id="news-query"
        type="text"
        class="form-control"
        autocomplete="off"
        placeholder="mundo, tecnología, deportes…"
        [ngModel]="query()"
        (ngModelChange)="query.set($event)"
        name="q"
      />
    </div>
    <div class="run-controls__field">
      <label class="form-label" for="news-language">Idioma</label>
      <select
        id="news-language"
        class="form-select"
        [ngModel]="language()"
        (ngModelChange)="language.set($event)"
        name="language"
      >
        @for (l of languages; track l.code) {
          <option [value]="l.code">{{ l.label }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">Buscar</button>
  </div>
</form>
