<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="pokemon-name">Nombre</label>
      <input
        id="pokemon-name"
        type="text"
        class="form-control"
        autocomplete="off"
        placeholder="pikachu, charizard, ditto…"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        name="name"
        [disabled]="!!type()"
      />
    </div>
    <div class="run-controls__field">
      <label class="form-label" for="pokemon-type">Tipo</label>
      <select
        id="pokemon-type"
        class="form-select"
        [ngModel]="type()"
        (ngModelChange)="type.set($event)"
        name="type"
      >
        <option value="">— Por nombre —</option>
        @for (t of types; track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit" [disabled]="loadingType()">
      @if (loadingType()) {
        <span class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
      }
      Buscar
    </button>
  </div>

  @if (typeError(); as err) {
    <p class="run-controls__hint text-danger mb-0" role="alert">{{ err }}</p>
  }

  @if (typeList(); as list) {
    <div class="pokemon-controls__list" role="group" aria-label="Pokémon del tipo seleccionado">
      <p class="run-controls__hint mb-0">
        {{ list.length }} pokémon del tipo «{{ type() }}». Pulsa uno para ver su ficha.
      </p>
      <div class="pokemon-controls__pills">
        @for (n of list; track n) {
          <button
            type="button"
            class="btn btn-sm btn-outline-secondary pokemon-controls__pill"
            (click)="pickName(n)"
          >
            {{ n }}
          </button>
        }
      </div>
    </div>
  }
</form>
