<form class="run-controls" (ngSubmit)="submit()">
  <div class="run-controls__row">
    <div class="run-controls__field flex-grow-1">
      <label class="form-label" for="cats-breed">Raza (opcional)</label>
      <select
        id="cats-breed"
        class="form-select"
        [ngModel]="breed()"
        (ngModelChange)="breed.set($event)"
        name="breed"
        [disabled]="loadingBreeds()"
      >
        <option value="">— Cualquier raza —</option>
        @for (b of breeds(); track b.id) {
          <option [value]="b.id">{{ b.name }}</option>
        }
      </select>
    </div>
    <button type="submit" class="btn btn-primary run-controls__submit">
      Otra imagen
    </button>
  </div>
  @if (breedsError(); as err) {
    <p class="run-controls__hint text-warning-emphasis mb-0" role="alert">{{ err }}</p>
  } @else if (loadingBreeds()) {
    <p class="run-controls__hint mb-0">Cargando razas…</p>
  }
</form>
