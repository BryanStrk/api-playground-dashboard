@if (tracks().length === 0) {
  <p class="text-secondary mb-0">No hay canciones que mostrar.</p>
} @else {
  <ul class="audio-result list-unstyled mb-0">
    @for (t of tracks(); track t.trackId) {
      <li class="audio-result__item" [class.is-playing]="isPlaying(t.trackId)">
        <img
          class="audio-result__art rounded"
          [src]="t.artworkUrl ?? placeholder"
          [alt]="'Carátula de ' + t.trackName"
          loading="lazy"
          (error)="onImgError($event)"
        />
        <div class="audio-result__meta">
          <p class="audio-result__title mb-0">{{ t.trackName }}</p>
          <p class="audio-result__artist mb-0">{{ t.artistName }}</p>
          @if (t.collectionName) {
            <p class="audio-result__album mb-0">{{ t.collectionName }}</p>
          }
        </div>
        @if (t.previewUrl) {
          <button
            type="button"
            class="audio-result__play"
            [class.is-playing]="isPlaying(t.trackId)"
            [attr.aria-pressed]="isPlaying(t.trackId)"
            [attr.aria-label]="(isPlaying(t.trackId) ? 'Pausar ' : 'Reproducir ') + t.trackName + ' de ' + t.artistName"
            (click)="toggle(t)"
          >
            @if (isLoading(t.trackId)) {
              <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
            } @else if (isPlaying(t.trackId)) {
              <span class="audio-result__icon" aria-hidden="true">❚❚</span>
            } @else {
              <span class="audio-result__icon" aria-hidden="true">▶</span>
            }
            <span class="audio-result__play-label">
              {{ isPlaying(t.trackId) ? 'Pausa' : 'Play' }}
            </span>
          </button>
        } @else {
          <span class="audio-result__no-preview text-secondary small">sin preview</span>
        }
      </li>
    }
  </ul>
}
