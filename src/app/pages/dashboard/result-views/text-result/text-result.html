@switch (view().kind) {
  @case ('post') {
    @if (view(); as v) {
      @if (v.kind === 'post') {
        <article class="text-result text-result--post">
          <h3 class="text-result__title h6 mb-0">{{ v.title }}</h3>
          <p class="text-result__body mb-0">{{ v.body }}</p>
        </article>
      }
    }
  }
  @default {
    <p class="text-secondary mb-0">No hay contenido que mostrar.</p>
  }
}
