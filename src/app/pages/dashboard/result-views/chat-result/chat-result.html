<section class="chat-result" aria-label="Chat con Gemini">
  <div
    #scrollHost
    class="chat-result__history"
    aria-live="polite"
    aria-atomic="false"
  >
    @if (messages().length === 0) {
      <p class="chat-result__empty mb-0">
        Escribe un mensaje para empezar a charlar con Gemini.
      </p>
    } @else {
      @for (m of messages(); track $index) {
        <article class="chat-result__msg" [class.is-user]="m.role === 'user'">
          <span class="chat-result__role visually-hidden">
            {{ m.role === 'user' ? 'Tú' : 'Gemini' }}
          </span>
          <p class="chat-result__bubble mb-0">{{ m.text }}</p>
        </article>
      }
      @if (sending()) {
        <article class="chat-result__msg" aria-label="Gemini está escribiendo">
          <p class="chat-result__bubble chat-result__bubble--typing mb-0">
            <span class="chat-result__dot"></span>
            <span class="chat-result__dot"></span>
            <span class="chat-result__dot"></span>
          </p>
        </article>
      }
    }
  </div>

  @if (error(); as err) {
    <div class="alert alert-warning py-2 mb-0 small d-flex align-items-center gap-2" role="alert">
      <span class="flex-grow-1">{{ err }}</span>
      <button type="button" class="btn btn-sm btn-outline-secondary" (click)="retryLast()">
        Reintentar
      </button>
    </div>
  }

  <form class="chat-result__composer" (ngSubmit)="send()">
    <label class="visually-hidden" for="chat-draft">Mensaje</label>
    <textarea
      id="chat-draft"
      class="form-control chat-result__textarea"
      rows="2"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keydown)="onKeydown($event)"
      name="draft"
      placeholder="Escribe tu mensaje. Enter para enviar, Shift+Enter para salto de línea."
      [disabled]="sending()"
    ></textarea>
    <div class="chat-result__actions">
      <button
        type="button"
        class="btn btn-sm btn-outline-secondary"
        (click)="reset()"
        [disabled]="sending() || messages().length === 0"
      >
        Limpiar
      </button>
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="sending() || draft().trim().length === 0"
      >
        @if (sending()) {
          <span class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
        }
        Enviar
      </button>
    </div>
  </form>
</section>
