<article
  class="card api-card h-100 shadow-sm rounded-3 border"
  [attr.aria-labelledby]="'card-' + api().id + '-title'"
>
  <div class="card-body d-flex flex-column gap-2">
    <header class="d-flex align-items-start justify-content-between gap-2">
      <h2
        class="card-title h6 mb-0 text-truncate"
        [id]="'card-' + api().id + '-title'"
        [title]="api().name"
      >
        {{ api().name }}
      </h2>
      <app-status-badge variant="key" [requiresKey]="api().requiresKey" />
    </header>

    <div class="d-flex flex-wrap gap-1">
      <span class="badge rounded-pill text-bg-secondary-subtle text-secondary-emphasis border">{{ api().category }}</span>
      <app-status-badge variant="difficulty" [difficulty]="api().difficulty" />
    </div>

    <p class="card-text small text-secondary mb-0 api-card__desc">
      {{ api().description }}
    </p>

    <code class="api-card__endpoint text-truncate" [title]="api().localEndpoint">
      {{ api().localEndpoint }}
    </code>

    @if (api().officialUrl) {
      <a
        class="api-card__official-link"
        [href]="api().officialUrl"
        target="_blank"
        rel="noopener noreferrer"
        [attr.aria-label]="'Abrir documentación oficial de ' + api().name"
      >
        <span aria-hidden="true">🌐</span>
        <span>Web oficial</span>
      </a>
    }
  </div>

  <footer class="card-footer bg-transparent border-top-0 pt-0 d-flex align-items-center justify-content-between gap-2">
    <button
      type="button"
      class="btn btn-sm btn-outline-primary"
      [attr.aria-label]="'Ejecutar ' + api().name"
      (click)="onRun()"
    >
      Ejecutar
    </button>

    <app-status-badge
      variant="health"
      [status]="health()?.status ?? null"
      [responseTimeMs]="health()?.responseTimeMs ?? null"
      [loading]="loading()"
    />
  </footer>
</article>
